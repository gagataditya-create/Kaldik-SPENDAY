<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaldik Guru SMPN 2 Ayah</title>
    
    <!-- Ikon Aplikasi untuk Browser dan iOS -->
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">

    <!-- Script Manifest Dinamis untuk instalasi PWA -->
    <script>
        const manifest = {
            "name": "Kaldik SMPN 2 Ayah",
            "short_name": "Kaldik",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#020806",
            "theme_color": "#020806",
            "icons": [{
                "src": "logo.png",
                "sizes": "192x192",
                "type": "image/png"
            }, {
                "src": "logo.png",
                "sizes": "512x512",
                "type": "image/png"
            }]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);

        // Service Worker Virtual agar browser yakin ini PWA resmi
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = "self.addEventListener('fetch', () => {});";
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                const swUrl = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swUrl).catch(err => console.log('SW reg failed', err));
            });
        }

        // Tangkap event instalasi secepat kilat
        window.globalDeferredPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.globalDeferredPrompt = e;
        });
    </script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
      }
    }
    </script>
    
    <!-- Babel Standalone untuk membaca JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Gaya Scrollbar Neon */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(2, 8, 6, 0.8); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(52, 211, 153, 0.3); border-radius: 10px; box-shadow: 0 0 10px rgba(52,211,153,0.5); }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(52, 211, 153, 0.8); }

        /* Utilitas Elegan Neon Dark Mode */
        .neon-text { 
            color: #34D399; 
            text-shadow: 0 0 8px rgba(52, 211, 153, 0.6), 0 0 15px rgba(52, 211, 153, 0.3); 
        }
        .neon-bg { 
            background-color: #10B981; 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5), inset 0 0 8px rgba(255,255,255,0.3);
            color: #020806;
        }
        .dark-glass { 
            background: rgba(6, 20, 16, 0.7); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(52, 211, 153, 0.2); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), 0 0 20px rgba(52, 211, 153, 0.05);
        }
        .neon-border {
            border: 1px solid rgba(52, 211, 153, 0.5);
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.2), inset 0 0 10px rgba(52, 211, 153, 0.1);
        }
    </style>
</head>
<body class="bg-[#020806] text-[#E0EBE6] selection:bg-[#34D399] selection:text-[#020806]">
    <!-- Wadah Utama -->
    <div id="root"></div>

    <script type="text/babel" data-type="module">
import { createRoot } from 'react-dom/client';
import React, { useState, useEffect } from 'react';
import { 
  Calendar, BookOpen, X, Loader2, LayoutGrid, LayoutTemplate, Download, Smartphone, Share
} from 'lucide-react';
import { initializeApp } from 'firebase/app';
import { getFirestore, doc, getDoc } from 'firebase/firestore';
import { getAuth, signInAnonymously } from 'firebase/auth';

const firebaseConfig = {
  apiKey: "AIzaSyAbZcPJHnaARMEjg23iwViwtfzjwb23vKg",
  authDomain: "project-umum-a58eb.firebaseapp.com",
  projectId: "project-umum-a58eb",
  storageBucket: "project-umum-a58eb.firebasestorage.app",
  messagingSenderId: "778774567319",
  appId: "1:778774567319:web:1c2b35335ce1c3550bccd2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const getEventType = (title, category, customType = null) => {
  if (customType) return customType;
  const t = title ? title.toLowerCase() : '';
  const c = category ? category.toLowerCase() : '';
  
  if (c.includes('skb') || t.includes('libur') || t.includes('cuti') || t.includes('wafat') || t.includes('kenaikan') || t.includes('hari raya') || t.includes('natal') || t.includes('maulid') || t.includes('tahun baru') || t.includes('imlek') || t.includes('nyepi') || t.includes('waisak') || t.includes('pancasila') || t.includes('buruh') || t.includes('isra')) return 'holiday';
  if (t.includes('asesmen') || t.includes('penilaian') || t.includes('anbk') || t.includes('sumatif') || t.includes('pts') || t.includes('pas') || t.includes('pat') || t.includes('sulingjar') || t.includes('ats') || t.includes('psas') || t.includes('asaj') || t.includes('asat')) return 'exam';
  if (t.includes('rapor') || t.includes('spmb') || t.includes('ppdb') || t.includes('daftar ulang') || t.includes('mpls') || t.includes('persiapan')) return 'report';
  if (t.includes('hut') || t.includes('lomba') || t.includes('classmeeting') || t.includes('pentas') || t.includes('wisuda') || t.includes('gelar karya') || t.includes('jeda') || t.includes('bulan bahasa') || t.includes('kunjungan')) return 'celebration';
  if (c.includes('jateng') || c.includes('kebumen') || c.includes('dinas')) return 'dinas';
  return 'school';
};

// Palet warna tetap utuh untuk fungsi visual kegiatan
const getColorPalette = (type) => {
    switch (type) {
        case 'holiday': return { bg: 'bg-red-500', hex: '#ef4444', text: 'text-white', border: 'border-red-600', dot: 'bg-red-200', matrix: 'bg-red-600 border-red-500', label: 'Libur' };
        case 'exam': return { bg: 'bg-purple-500', hex: '#a855f7', text: 'text-white', border: 'border-purple-600', dot: 'bg-purple-200', matrix: 'bg-purple-600 border-purple-500', label: 'Asesmen' };
        case 'report': return { bg: 'bg-blue-500', hex: '#3b82f6', text: 'text-white', border: 'border-blue-600', dot: 'bg-blue-200', matrix: 'bg-blue-600 border-blue-500', label: 'Rapor' };
        case 'celebration': return { bg: 'bg-pink-500', hex: '#ec4899', text: 'text-white', border: 'border-pink-600', dot: 'bg-pink-200', matrix: 'bg-pink-600 border-pink-500', label: 'Kegiatan' };
        case 'dinas': return { bg: 'bg-orange-500', hex: '#f97316', text: 'text-white', border: 'border-orange-600', dot: 'bg-orange-200', matrix: 'bg-orange-500 border-orange-400', label: 'Dinas' };
        default: return { bg: 'bg-emerald-500', hex: '#10b981', text: 'text-white', border: 'border-emerald-600', dot: 'bg-emerald-200', matrix: 'bg-emerald-500 border-emerald-400', label: 'Sekolah' };
    }
};

function App() {
  const [calendarViewMode, setCalendarViewMode] = useState('wall'); 
  const [events, setEvents] = useState([]);
  const [isLoading, setIsLoading] = useState(true);
  const [selectedDay, setSelectedDay] = useState(null);
  const [hoveredInfo, setHoveredInfo] = useState(null); 
  
  const [settings, setSettings] = useState({
    academicYear: '2026/2027',
  });

  const [installPrompt, setInstallPrompt] = useState(null);
  const [showPwaPrompt, setShowPwaPrompt] = useState(false);
  const [isIOS, setIsIOS] = useState(false);

  useEffect(() => {
    signInAnonymously(auth).then(async () => {
        try {
            const kaldikRef = doc(db, "kaldik_master", "kaldik_smpn2ayah_master");
            const docSnap = await getDoc(kaldikRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.settings) setSettings(data.settings);
                if (data.events) setEvents(data.events);
            }
            setIsLoading(false);
        } catch (error) {
            console.error("Gagal memuat data dari Firebase:", error);
            setIsLoading(false);
        }
    }).catch(err => {
        console.error("Firebase Auth Error:", err);
        setIsLoading(false);
    });

    const checkIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    setIsIOS(checkIOS);
    
    // Munculkan instruksi PWA Agresif dalam 1 detik
    if (checkIOS && !window.navigator.standalone) {
        setTimeout(() => setShowPwaPrompt(true), 1000); 
    }
    if (window.globalDeferredPrompt) {
        setInstallPrompt(window.globalDeferredPrompt);
        setTimeout(() => setShowPwaPrompt(true), 1000);
    }
    const handleBeforeInstallPrompt = (e) => {
        e.preventDefault();
        setInstallPrompt(e);
        setTimeout(() => setShowPwaPrompt(true), 1000);
    };
    window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
    return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
  }, []);

  const handleInstallApp = async () => {
      if (installPrompt) {
          installPrompt.prompt();
          const { outcome } = await installPrompt.userChoice;
          if (outcome === 'accepted') setShowPwaPrompt(false);
          setInstallPrompt(null);
      }
  };

  const renderWallCalendar = () => {
    const months = [];
    const startYear = parseInt(settings.academicYear.split('/')[0]);
    for (let i = 6; i <= 17; i++) months.push(new Date(startYear, i, 1));
    
    return (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {months.map((mDate, idx) => {
                const y = mDate.getFullYear();
                const m = mDate.getMonth();
                const days = Array.from({ length: new Date(y, m + 1, 0).getDate() }, (_, i) => i + 1);
                const first = new Date(y, m, 1).getDay();
                
                return (
                    // Bingkai Kalender menggunakan kertas Putih sesuai instruksi
                    <div key={idx} className="rounded-2xl border border-transparent bg-white overflow-hidden shadow-[0_0_20px_rgba(0,0,0,0.8)] ring-1 ring-[#34D399]/40 relative group">
                        
                        {/* Efek Neon Glow yang halus di sekitar pinggiran kertas */}
                        <div className="absolute inset-0 bg-[#34D399] opacity-0 group-hover:opacity-10 pointer-events-none transition-opacity duration-500"></div>

                        {}
                        {/* Header Bulan: Hijau Tua Redup dengan Teks Putih */}
                        <div className="bg-[#153E2A] p-4 text-white font-extrabold flex justify-between uppercase border-b border-[#34D399]/50 shadow-sm">
                            <span>{mDate.toLocaleString('id-ID', {month:'long'})}</span>
                            <span>{y}</span>
                        </div>

                        {/* Isi Kertas Kalender Putih Bersih */}
                        <div className="p-3 grid grid-cols-7 gap-2 text-center text-[10px] font-bold text-slate-500 relative z-10">
                            <div className="text-red-500">MIN</div><div>SEN</div><div>SEL</div><div>RAB</div><div>KAM</div><div>JUM</div><div>SAB</div>
                            {Array(first).fill(null).map((_, i) => <div key={i}></div>)}
                            {days.map(d => {
                                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                const dEvents = events.filter(e => e.date === dStr);
                                const top = dEvents[0];
                                const isSun = new Date(y, m, d).getDay() === 0;
                                
                                let style = {};
                                let cls = "";
                                
                                if (isSun) {
                                    cls = "text-red-500 border-transparent bg-transparent";
                                } else if (dEvents.length >= 2) {
                                    const step = 100 / dEvents.length;
                                    let gradientStops = [];
                                    dEvents.forEach((ev, i) => {
                                        const hexColor = getColorPalette(getEventType(ev.title, ev.category, ev.customType)).hex;
                                        gradientStops.push(`${hexColor} ${i * step}%`);
                                        gradientStops.push(`${hexColor} ${(i + 1) * step}%`);
                                    });
                                    style = { background: `linear-gradient(135deg, ${gradientStops.join(', ')})` };
                                    cls = "text-white border-transparent shadow-sm";
                                } else if (top) {
                                    cls = getColorPalette(getEventType(top.title, top.category, top.customType)).bg + " text-white border-transparent shadow-sm";
                                } else {
                                    cls = "text-slate-700 border-transparent bg-transparent hover:bg-slate-100";
                                }

                                return (
                                    <div 
                                        key={d} 
                                        style={style} 
                                        onClick={() => dEvents.length > 0 && setSelectedDay({date:dStr, events:dEvents})} 
                                        onMouseEnter={(e) => {
                                            if(dEvents.length > 0) {
                                                const rect = e.currentTarget.getBoundingClientRect();
                                                setHoveredInfo({x: rect.left + rect.width/2, y: rect.top - 10, events: dEvents});
                                            }
                                        }}
                                        onMouseLeave={() => setHoveredInfo(null)}
                                        className={`h-10 w-full rounded-xl flex items-center justify-center cursor-pointer transition hover:scale-105 border ${cls}`}
                                    >
                                        <span className="text-sm font-bold">{d}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            })}
        </div>
    );
  };

  const renderMatrixCalendar = () => {
    const months = [];
    const startYear = parseInt(settings.academicYear.split('/')[0]);
    for (let i = 6; i <= 17; i++) months.push(new Date(startYear, i, 1));
    
    return (
        <div className="overflow-x-auto custom-scrollbar pb-4">
            <div className="min-w-[1000px] space-y-1">
                {months.map((mDate, idx) => {
                    const y = mDate.getFullYear(), m = mDate.getMonth(), last = new Date(y, m+1, 0).getDate();
                    return (
                        <div key={idx} className="grid grid-cols-[120px_repeat(31,1fr)] gap-1">
                            {/* Header Bulan: Efek Kaca Gelap dengan Cahaya Neon */}
                            <div className="dark-glass text-[#34D399] neon-text text-[10px] p-2 rounded font-bold uppercase flex items-center justify-center text-center">
                                {mDate.toLocaleString('id-ID', {month:'short'})} {y}
                            </div>
                            {Array.from({length:31}, (_, i) => i+1).map(d => {
                                if (d > last) return <div key={d} className="h-8 bg-white/5 rounded backdrop-blur-sm"></div>;
                                
                                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                const evs = events.filter(e => e.date === dStr);
                                const top = evs[0];
                                const isSun = new Date(y, m, d).getDay() === 0;
                                
                                let dynamicClasses = "";
                                if (isSun) {
                                    // Kertas Putih untuk hari libur murni
                                    dynamicClasses = "bg-rose-50 text-red-500 border-slate-200";
                                } else if (top) {
                                    dynamicClasses = getColorPalette(getEventType(top.title, top.category, top.customType)).matrix + " text-white border-transparent shadow-sm";
                                } else {
                                    // Kertas putih murni untuk isi
                                    dynamicClasses = "bg-white text-slate-700 border-slate-200 hover:bg-slate-50";
                                }
                                
                                if (evs.length > 0) dynamicClasses += " cursor-pointer hover:scale-110 transition-transform z-10 relative";

                                return (
                                    <div 
                                        key={d} 
                                        className={`h-8 border rounded flex items-center justify-center text-[10px] font-bold transition-colors ${dynamicClasses}`}
                                        onClick={() => evs.length > 0 && setSelectedDay({date:dStr, events:evs})}
                                        onMouseEnter={(e) => {
                                            if(evs.length > 0) {
                                                const rect = e.currentTarget.getBoundingClientRect();
                                                setHoveredInfo({x: rect.left + rect.width/2, y: rect.top - 10, events: evs});
                                            }
                                        }}
                                        onMouseLeave={() => setHoveredInfo(null)}
                                    >
                                        {d}
                                    </div>
                                );
                            })}
                        </div>
                    );
                })}
            </div>
        </div>
    )};

  return (
    <div className="min-h-screen bg-[#020806] text-[#E0EBE6] relative pb-10 font-sans selection:bg-[#34D399] selection:text-black">
      
      {/* Header Utama dengan Efek Kaca Blur (Glassmorphism) dan Neon Border */}
      <nav className="sticky top-0 z-50 dark-glass h-20 flex items-center px-6 border-b border-[#34D399]/30">
        <div className="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div className="flex items-center gap-3">
                <div className="neon-bg p-2 rounded-lg text-[#020806] font-black">
                    <BookOpen className="w-6 h-6"/>
                </div>
                <div>
                    <div className="font-extrabold text-xl text-white tracking-wide">
                        Kaldik <span className="neon-text">SMPN 2 Ayah</span>
                    </div>
                    <div className="text-[10px] text-[#34D399] uppercase tracking-widest font-bold bg-[#040D0A] border border-[#34D399]/40 px-2 py-0.5 rounded inline-block mt-0.5">
                        Mode Guru (Viewer)
                    </div>
                </div>
            </div>
            
            <div className="flex bg-[#040D0A] p-1 rounded-xl border border-[#34D399]/30 shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)]">
                <button 
                    onClick={() => setCalendarViewMode('wall')} 
                    className={`px-4 py-2 text-xs font-bold rounded-lg flex items-center gap-2 transition ${calendarViewMode==='wall' ? 'neon-bg' : 'text-[#8B9E96] hover:text-[#34D399]'}`}
                >
                    <LayoutTemplate className="w-4 h-4"/> <span className="hidden sm:inline">Dinding</span>
                </button>
                <button 
                    onClick={() => setCalendarViewMode('matrix')} 
                    className={`px-4 py-2 text-xs font-bold rounded-lg flex items-center gap-2 transition ${calendarViewMode==='matrix' ? 'neon-bg' : 'text-[#8B9E96] hover:text-[#34D399]'}`}
                >
                    <LayoutGrid className="w-4 h-4"/> <span className="hidden sm:inline">Matriks</span>
                </button>
            </div>
        </div>
      </nav>
      
      {/* Area Konten Utama */}
      <main className="max-w-[1400px] mx-auto px-4 py-8">
        <div className="dark-glass rounded-3xl p-6 relative min-h-[500px]">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 border-b border-[#34D399]/20 pb-4">
                <div>
                    <h3 className="text-xl md:text-2xl font-bold flex items-center gap-3 text-white">
                        <Calendar className="text-[#34D399] w-7 h-7 filter drop-shadow-[0_0_8px_rgba(52,211,153,0.8)]"/> 
                        Kalender Akademik Resmi
                    </h3>
                    <p className="text-sm text-[#8B9E96] mt-1">
                        Tahun Pelajaran <span className="neon-text font-bold">{settings.academicYear}</span>
                    </p>
                </div>
                
                {/* Legenda Singkat Neon */}
                <div className="flex flex-wrap gap-2 text-[10px] font-bold">
                    <div className="flex items-center gap-1.5 bg-[#040D0A] px-2.5 py-1.5 rounded-lg border border-[#34D399]/30 shadow-[0_0_10px_rgba(52,211,153,0.1)]">
                        <div className="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>Libur
                    </div>
                    <div className="flex items-center gap-1.5 bg-[#040D0A] px-2.5 py-1.5 rounded-lg border border-[#34D399]/30 shadow-[0_0_10px_rgba(52,211,153,0.1)]">
                        <div className="w-3 h-3 rounded-full bg-purple-500 shadow-[0_0_8px_rgba(168,85,247,0.8)]"></div>Asesmen
                    </div>
                    <div className="flex items-center gap-1.5 bg-[#040D0A] px-2.5 py-1.5 rounded-lg border border-[#34D399]/30 shadow-[0_0_10px_rgba(52,211,153,0.1)]">
                        <div className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>Sekolah
                    </div>
                </div>
            </div>

            {isLoading ? (
                <div className="absolute inset-0 flex flex-col items-center justify-center dark-glass z-10 rounded-3xl">
                    <Loader2 className="w-12 h-12 text-[#34D399] animate-spin mb-4 filter drop-shadow-[0_0_10px_rgba(52,211,153,0.8)]" />
                    <p className="neon-text font-medium text-lg tracking-wider">MENGAKSES SERVER...</p>
                </div>
            ) : (
                <div className="animate-in fade-in duration-700">
                    {calendarViewMode === 'wall' ? renderWallCalendar() : renderMatrixCalendar()}
                </div>
            )}
        </div>
      </main>

      {/* POP-UP INFO SAAT HOVER (Efek Neon) */}
      {hoveredInfo && (
          <div 
            className="fixed z-[9999] pointer-events-none transform -translate-x-1/2 -translate-y-full px-3 py-2 dark-glass neon-border text-white text-xs rounded-lg whitespace-nowrap"
            style={{ left: hoveredInfo.x, top: hoveredInfo.y }}
          >
              <div className="font-bold mb-1 neon-text">{hoveredInfo.events.length} Agenda:</div>
              {hoveredInfo.events.slice(0, 3).map((e, i) => (
                  <div key={i} className="flex items-center gap-1.5 opacity-90">
                      <div className={`w-1.5 h-1.5 rounded-full ${getColorPalette(getEventType(e.title, e.category, e.customType)).bg}`}></div>
                      {e.title.length > 30 ? e.title.substring(0, 30) + '...' : e.title}
                  </div>
              ))}
              {hoveredInfo.events.length > 3 && <div className="text-[10px] text-[#8B9E96] mt-1 italic">+{hoveredInfo.events.length - 3} lainnya...</div>}
              <div className="absolute left-1/2 -bottom-1 -translate-x-1/2 w-2 h-2 dark-glass border-r border-b border-[#34D399]/50 transform rotate-45"></div>
          </div>
      )}

      {/* POP-UP DETAIL AGENDA SAAT TANGGAL DIKLIK */}
      {selectedDay && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
            <div className="dark-glass neon-border rounded-3xl max-w-md w-full overflow-hidden animate-in zoom-in-95">
                <div className="bg-[#020806] p-5 flex justify-between text-white border-b border-[#34D399]/30">
                    <div>
                        <h4 className="font-bold text-lg neon-text">
                            {new Date(selectedDay.date).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}
                        </h4>
                        <p className="text-xs text-[#8B9E96]">{selectedDay.events.length} Data Deskripsi</p>
                    </div>
                    <button onClick={() => setSelectedDay(null)} className="hover:bg-[#10B981]/20 text-[#8B9E96] hover:text-[#34D399] p-1 rounded-lg transition">
                        <X className="w-6 h-6"/>
                    </button>
                </div>
                <div className="p-6 space-y-3 bg-[#040D0A] max-h-[60vh] overflow-y-auto custom-scrollbar">
                    {selectedDay.events.map((ev, i) => {
                        const col = getColorPalette(getEventType(ev.title, ev.category, ev.customType));
                        return (
                            <div key={i} className={`p-4 rounded-xl border-l-4 bg-[#061410] shadow-[0_2px_10px_rgba(0,0,0,0.5)] transition ${col.border}`}>
                                <div className="text-[10px] font-bold text-[#8B9E96] mb-1 flex items-center gap-1.5">
                                    <div className={`w-2 h-2 rounded-full ${col.bg}`}></div>
                                    {col.label} • {ev.category}
                                </div>
                                <div className="font-bold text-[#E0EBE6] tracking-wide">{ev.title}</div>
                            </div>
                        );
                    })}
                </div>
                <div className="p-4 flex justify-end bg-[#020806] border-t border-[#34D399]/30">
                    <button onClick={() => setSelectedDay(null)} className="px-6 py-2.5 bg-[#040D0A] hover:bg-[#061410] text-[#34D399] neon-border rounded-xl font-bold text-sm transition">
                        Tutup Panel
                    </button>
                </div>
            </div>
        </div>
      )}

      {/* POP-UP PWA (AGRESIF NEON) */}
      {showPwaPrompt && (
        <div className="fixed inset-0 z-[9999] flex items-end sm:items-center justify-center bg-black/90 backdrop-blur-md p-4">
            <div className="dark-glass neon-border w-full max-w-sm rounded-3xl p-6 animate-in slide-in-from-bottom-10 sm:zoom-in-95 flex flex-col items-center text-center">
                <div className="w-16 h-16 neon-bg rounded-2xl flex items-center justify-center mb-4">
                    <Smartphone className="w-8 h-8 text-[#020806]" />
                </div>
                <h3 className="text-xl font-black text-white mb-2 tracking-wide">SYSTEM INSTALL</h3>
                <p className="text-sm text-[#8B9E96] mb-6">
                    Akses kalender akademik lebih cepat dan optimal langsung dari layar utama perangkat Anda.
                </p>
                
                {isIOS ? (
                    <div className="bg-[#040D0A] border border-[#34D399]/40 rounded-xl p-4 w-full text-left flex flex-col gap-3 shadow-[inset_0_0_15px_rgba(52,211,153,0.05)]">
                        <p className="text-xs text-[#E0EBE6] font-medium">Bypass iOS (iPhone/iPad):</p>
                        <ol className="text-xs text-[#34D399] list-decimal pl-4 space-y-2">
                            <li>Tekan icon <Share className="inline w-3 h-3 mx-1"/> <b>Share</b> di Safari.</li>
                            <li>Pilih menu <b>"Add to Home Screen"</b>.</li>
                            <li>Tekan <b>"Add"</b> di ujung kanan atas.</li>
                        </ol>
                        <button onClick={() => setShowPwaPrompt(false)} className="mt-2 w-full py-2.5 bg-transparent border border-[#34D399] text-[#34D399] hover:bg-[#34D399]/10 font-bold text-sm rounded-lg transition">Dimengerti</button>
                    </div>
                ) : (
                    <div className="flex flex-col gap-3 w-full">
                        <button 
                            onClick={handleInstallApp} 
                            className="w-full py-3 neon-bg rounded-xl font-bold text-sm shadow-md flex items-center justify-center gap-2 hover:scale-105 transition duration-300"
                        >
                            <Download className="w-4 h-4"/> Instal Aplikasi
                        </button>
                        <button 
                            onClick={() => setShowPwaPrompt(false)} 
                            className="w-full py-3 bg-transparent text-[#8B9E96] hover:text-[#34D399] rounded-xl font-bold text-sm transition"
                        >
                            Abaikan
                        </button>
                    </div>
                )}
            </div>
        </div>
      )}
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
</body>
</html>
